<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>職業性格與AI替代率測評系統</title>
    <style>
        /* ================= 樣式設定 (CSS) ================= */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Helvetica Neue', Arial, '微軟正黑體', sans-serif;
            /* 背景圖片設定 */
            background-image: url('https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            /* 使用 Flexbox 讓內容置中 */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 懸浮卡片設計 */
        .card {
            background-color: rgba(255, 255, 255, 0.95); /* 白色半透明 */
            width: 90%;
            max-width: 650px;
            min-height: 400px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 40px;
            box-sizing: border-box;
            position: relative;
        }

        /* 隱藏區塊的類別 */
        .hidden {
            display: none !important;
        }

        /* 文字樣式 */
        h2 {
            color: #2b5c8f;
            line-height: 1.4;
            margin-bottom: 30px;
        }
        
        h3 {
            color: #333;
            font-size: 22px;
        }

        p {
            color: #555;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* 選項按鈕樣式 */
        .option-btn {
            display: block;
            width: 100%;
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            padding: 15px 20px;
            margin-bottom: 12px;
            border-radius: 8px;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #333;
        }

        .option-btn:hover {
            background-color: #e2e6ea;
            border-color: #dae0e5;
            transform: translateY(-2px);
        }

        /* OK / 重新測試按鈕樣式 */
        .primary-btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            display: block;
            margin: 30px auto 0;
            transition: background-color 0.3s ease;
        }

        .primary-btn:hover {
            background-color: #218838;
        }

        .secondary-btn {
            background-color: #6c757d;
            margin-top: 40px;
        }
        
        .secondary-btn:hover {
            background-color: #5a6268;
        }

        /* 進度條文字 */
        .progress {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-top: 30px;
        }

        /* 特定警告顏色 */
        .text-danger {
            color: #dc3545;
        }
    </style>
</head>
<body>

    <div class="card">
        
        <div id="view-question">
            <h2 id="q-text">題目載入中...</h2>
            <div id="options-container">
                </div>
            <div class="progress" id="progress-text">進度: 0 / 10</div>
        </div>

        <div id="view-personality" class="hidden">
            <h2>測評完成！您的職業性格傾向是：</h2>
            <h3 id="p-title"></h3>
            <p id="p-desc"></p>
            <button class="primary-btn" onclick="showAIImpact()">OK (查看該職業被AI取代的可能性)</button>
        </div>

        <div id="view-ai-impact" class="hidden">
            <h2 id="ai-title" class="text-danger"></h2>
            <h3 id="ai-rate"></h3>
            <p id="ai-reason"></p>
            <button class="primary-btn secondary-btn" onclick="restartTest()">重新測試</button>
        </div>

    </div>

    <script>
        /* ================= 邏輯設定 (JavaScript) ================= */
        
        // 題庫資料
        const QUESTIONS = [
            {q: "1. 在閒暇時間，你更傾向於做哪件事？", options: [{text: "拆解並修理壞掉的小家電", trait: "R"}, {text: "構思並繪製一幅插畫", trait: "A"}, {text: "閱讀一本關於宇宙起源的科普書", trait: "I"}]},
            {q: "2. 面對一個複雜的任務，你的第一反應是：", options: [{text: "馬上動手，邊做邊找感覺", trait: "R"}, {text: "尋找最獨特、最有創意的展現方式", trait: "A"}, {text: "先收集數據，分析任務的底層邏輯", trait: "I"}]},
            {q: "3. 你認為自己最大的優勢是：", options: [{text: "動手能力強，身體協調性好", trait: "R"}, {text: "想像力豐富，情感細膩", trait: "A"}, {text: "邏輯嚴密，善於發現問題根源", trait: "I"}]},
            {q: "4. 如果要參加一個短期培訓班，你會選擇：", options: [{text: "木工或機械操作實務", trait: "R"}, {text: "戲劇表演或劇本創作", trait: "A"}, {text: "Python數據分析與統計學", trait: "I"}]},
            {q: "5. 你最理想的工作環境是：", options: [{text: "有各種專業工具和設備的戶外或車間", trait: "R"}, {text: "充滿藝術氛圍，沒有硬性打卡要求的靈感空間", trait: "A"}, {text: "安靜的實驗室或擁有雙顯示螢幕的數據中心", trait: "I"}]},
            {q: "6. 當遇到爭論時，你通常依靠什麼來說服別人？", options: [{text: "直接演示實際效果給他們看", trait: "R"}, {text: "用富有感染力的語言和情感打動他們", trait: "A"}, {text: "列出客觀的數據和嚴謹的推理步驟", trait: "I"}]},
            {q: "7. 你最喜歡看哪種類型的紀錄片？", options: [{text: "《超級工程》或《荒野求生》", trait: "R"}, {text: "《羅浮宮的寶藏》或《電影配樂傳奇》", trait: "A"}, {text: "《霍金的宇宙》或《腦內乾坤》", trait: "I"}]},
            {q: "8. 桌子上有一堆雜亂的樂高積木，你會：", options: [{text: "按照圖紙一步步拼裝成標準的模型", trait: "R"}, {text: "不看圖紙，隨心所欲拼出一個奇妙的生物", trait: "A"}, {text: "先將積木按顏色和形狀進行分類統計", trait: "I"}]},
            {q: "9. 你對以下哪個職業最感興趣？", options: [{text: "精密機械工程師", trait: "R"}, {text: "自由撰稿人/插畫師", trait: "A"}, {text: "人工智慧演算法研究員", trait: "I"}]},
            {q: "10. 如果讓你為一個新產品做貢獻，你會負責：", options: [{text: "製造產品的實體原型", trait: "R"}, {text: "設計產品的外觀和宣傳文案", trait: "A"}, {text: "測試產品的各項性能指標並撰寫報告", trait: "I"}]}
        ];

        // 職業資料
        const PERSONALITY_INFO = {
            "R": {title: "R型 - 實際型 (Realistic)", desc: "你喜歡具體的任務，動手能力強，偏好使用工具和機器。做事踏實，喜歡能看到實際成果的工作，通常偏好戶外或操作性強的環境。"},
            "A": {title: "A型 - 藝術型 (Artistic)", desc: "你富有創造力、直覺力，追求個性化和審美。不喜歡高度結構化和死板的規定，擅長透過文字、圖像或聲音來表達深刻的情感與思想。"},
            "I": {title: "I型 - 研究型 (Investigative)", desc: "你充滿好奇心，喜歡觀察、學習和解決複雜問題。偏好邏輯分析和科學實驗，習慣用理性和客觀的數據來理解世界。"}
        };

        const AI_IMPACT_INFO = {
            "R": {rate: "60% - 80% (高風險)", reason: "高風險警告：實際型工作中包含大量重複性體力勞動和固定流程的操作。隨著機械臂、自動化機器人及物聯網的發展，這類工作極易被物理 AI 取代。建議提升設備管理與維修等不可替代的技能。"},
            "A": {rate: "15% - 25% (低風險)", reason: "低風險區域：雖然生成式 AI 能快速產出畫作或文章，但它們缺乏真正的靈魂、情感共鳴與原創世界觀。你的核心競爭力在於獨特的人性表達和深刻的同理心，這是 AI 難以企及的。"},
            "I": {rate: "30% - 50% (中等風險)", reason: "中等風險提示：AI 在數據收集、初步分析和程式碼輔助生成方面極其強大，會接管部分繁瑣的研究工作。但核心的科學決策、複雜實驗設計和從零到一的理論創新，依然高度依賴你的智慧。"}
        };

        // 狀態變數
        let scores = { "R": 0, "A": 0, "I": 0 };
        let currentQIndex = 0;
        let finalType = "";

        // DOM 元素參考
        const viewQuestion = document.getElementById('view-question');
        const viewPersonality = document.getElementById('view-personality');
        const viewAIImpact = document.getElementById('view-ai-impact');

        // 初始化載入
        window.onload = function() {
            loadQuestion();
        };

        function loadQuestion() {
            if (currentQIndex < QUESTIONS.length) {
                const qData = QUESTIONS[currentQIndex];
                
                // 更新題目文字
                document.getElementById('q-text').innerText = qData.q;
                
                // 清空並重新生成選項按鈕
                const optionsContainer = document.getElementById('options-container');
                optionsContainer.innerHTML = ''; // 清空
                
                qData.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt.text;
                    btn.onclick = () => recordAnswer(opt.trait);
                    optionsContainer.appendChild(btn);
                });

                // 更新進度
                document.getElementById('progress-text').innerText = `進度: ${currentQIndex + 1} / 10`;
            } else {
                calculateResult();
            }
        }

        function recordAnswer(trait) {
            scores[trait]++;
            currentQIndex++;
            loadQuestion();
        }

        function calculateResult() {
            // 找出最高分的類型
            let maxScore = -1;
            for (const [trait, score] of Object.entries(scores)) {
                if (score > maxScore) {
                    maxScore = score;
                    finalType = trait;
                }
            }
            showPersonalityResult();
        }

        function showPersonalityResult() {
            // 切換畫面
            viewQuestion.classList.add('hidden');
            viewPersonality.classList.remove('hidden');

            const info = PERSONALITY_INFO[finalType];
            document.getElementById('p-title').innerText = info.title;
            document.getElementById('p-desc').innerText = info.desc;
        }

        function showAIImpact() {
            // 切換畫面
            viewPersonality.classList.add('hidden');
            viewAIImpact.classList.remove('hidden');

            const typeTitle = PERSONALITY_INFO[finalType].title;
            const aiInfo = AI_IMPACT_INFO[finalType];

            document.getElementById('ai-title').innerText = `【${typeTitle}】 的未來生存挑戰`;
            document.getElementById('ai-rate').innerText = `AI 取代可能性預測: ${aiInfo.rate}`;
            document.getElementById('ai-reason').innerText = aiInfo.reason;
        }

        function restartTest() {
            // 重置狀態
            scores = { "R": 0, "A": 0, "I": 0 };
            currentQIndex = 0;
            finalType = "";

            // 切換畫面
            viewAIImpact.classList.add('hidden');
            viewQuestion.classList.remove('hidden');

            // 重新載入第一題
            loadQuestion();
        }
    </script>
</body>
</html>
