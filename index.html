<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>職業性格與 AI 替代率測評系統 - 11 號攤位特別版</title>
    <style>
        /* ================= 樣式設定 (CSS) ================= */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Helvetica Neue', Arial, '微軟正黑體', sans-serif;
            background-image: url('https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background-color: rgba(255, 255, 255, 0.95);
            width: 95%;
            max-width: 650px;
            min-height: 450px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 40px;
            box-sizing: border-box;
            position: relative;
        }

        .hidden {
            display: none !important;
        }

        h2 { color: #2b5c8f; line-height: 1.4; margin-bottom: 25px; }
        h3 { color: #333; font-size: 22px; }
        p { color: #555; font-size: 16px; line-height: 1.6; margin-bottom: 20px; }

        .option-btn {
            display: block;
            width: 100%;
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            padding: 15px 20px;
            margin-bottom: 12px;
            border-radius: 8px;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #333;
        }

        .option-btn:hover {
            background-color: #e2e6ea;
            border-color: #dae0e5;
            transform: translateY(-2px);
        }

        /* 攤位資訊樣式 */
        .booth-info {
            background-color: #e3f2fd;
            color: #1976d2;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
            font-weight: bold;
            border: 1px dashed #2196f3;
        }

        .primary-btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            display: block;
            margin: 20px auto 0;
            transition: background-color 0.3s ease;
        }

        .primary-btn:hover { background-color: #218838; }
        .secondary-btn { background-color: #6c757d; margin-top: 20px; }
        .progress { text-align: center; color: #888; font-size: 14px; margin-top: 30px; }
        .text-danger { color: #dc3545; }
    </style>
</head>
<body>

    <div class="card">
        <div id="view-question">
            <h2 id="q-text">題目載入中...</h2>
            <div id="options-container"></div>
            <div class="progress" id="progress-text">進度: 0 / 15</div>
        </div>

        <div id="view-personality" class="hidden">
            <h2>測評完成！您的職業性格傾向是：</h2>
            <h3 id="p-title"></h3>
            <p id="p-desc"></p>
            <div class="booth-info">✨ 想要更深入的專業解析嗎？<br>更多內容可以在 11 號攤位體驗！</div>
            <button class="primary-btn" onclick="showAIImpact()">OK (查看該職業被 AI 取代的可能性)</button>
        </div>

        <div id="view-ai-impact" class="hidden">
            <h2 id="ai-title" class="text-danger"></h2>
            <h3 id="ai-rate"></h3>
            <p id="ai-reason"></p>
            <div class="booth-info">🚀 領取您的 AI 時代生存指南：<br>歡迎至 11 號攤位進行詳細諮詢！</div>
            <button class="primary-btn secondary-btn" onclick="restartTest()">重新測試</button>
        </div>
    </div>

    <script>
        /* ================= 邏輯設定 (JavaScript) ================= */
        
        // 擴充至 15 題，涵蓋 RIASEC
        const QUESTIONS = [
            {q: "1. 在閒暇時間，你更傾向於做哪件事？", options: [{text: "拆解並修理壞掉的小家電", trait: "R"}, {text: "構思並繪製一幅插畫", trait: "A"}, {text: "閱讀一本關於宇宙起源的科普書", trait: "I"}]},
            {q: "2. 面對複雜任務，你的第一反應是：", options: [{text: "馬上動手，邊做邊找感覺", trait: "R"}, {text: "尋找最獨特、最有創意的展現方式", trait: "A"}, {text: "先分析數據與底層邏輯", trait: "I"}]},
            {q: "3. 你認為自己最大的優勢是：", options: [{text: "動手能力強，身體協調性好", trait: "R"}, {text: "想像力豐富，情感細膩", trait: "A"}, {text: "邏輯嚴密，善於發現問題根源", trait: "I"}]},
            {q: "4. 如果參加短期培訓班，你會選擇：", options: [{text: "木工或機械操作實務", trait: "R"}, {text: "戲劇表演或劇本創作", trait: "A"}, {text: "數據分析與統計學", trait: "I"}]},
            {q: "5. 你最理想的工作環境是：", options: [{text: "有專業設備的戶外或車間", trait: "R"}, {text: "充滿藝術氛圍的靈感空間", trait: "A"}, {text: "安靜的實驗室或數據中心", trait: "I"}]},
            {q: "6. 當遇到爭論時，你通常依靠：", options: [{text: "直接演示實際效果", trait: "R"}, {text: "用富有感染力的語言打動他人", trait: "A"}, {text: "列出客觀數據與嚴謹推理", trait: "I"}]},
            {q: "7. 你最喜歡看哪種類型的紀錄片？", options: [{text: "《超級工程》或《荒野求生》", trait: "R"}, {text: "《電影配樂傳奇》", trait: "A"}, {text: "《霍金的宇宙》", trait: "I"}]},
            {q: "8. 面對雜亂的樂高積木，你會：", options: [{text: "按照圖紙一步步拼裝", trait: "R"}, {text: "隨心所欲拼出奇妙生物", trait: "A"}, {text: "先按顏色形狀進行分類", trait: "I"}]},
            {q: "9. 你對以下哪個職業最感興趣？", options: [{text: "精密機械工程師", trait: "R"}, {text: "自由撰稿人/插畫師", trait: "A"}, {text: "人工智慧演算法研究員", trait: "I"}]},
            {q: "10. 為新產品做貢獻，你會負責：", options: [{text: "製造產品的實體原型", trait: "R"}, {text: "設計產品外觀與文案", trait: "A"}, {text: "測試性能並撰寫報告", trait: "I"}]},
            {q: "11. 在聚會中，你通常扮演什麼角色？", options: [{text: "傾聽他人的煩惱並給予安慰", trait: "S"}, {text: "主導話題，推銷自己的想法", trait: "E"}, {text: "確保活動按流程進行", trait: "C"}]},
            {q: "12. 處理文件時，你最在乎的是：", options: [{text: "內容是否能幫助到人", trait: "S"}, {text: "是否能達成商業目標", trait: "E"}, {text: "格式與數據是否精確", trait: "C"}]},
            {q: "13. 如果要經營一家店，你會選擇：", options: [{text: "非營利社區服務空間", trait: "S"}, {text: "追求利潤的連鎖餐廳", trait: "E"}, {text: "專業會計或物流管理中心", trait: "C"}]},
            {q: "14. 面對衝突，你的處理方式是：", options: [{text: "化解雙方心結", trait: "S"}, {text: "果斷決策，以大局為重", trait: "E"}, {text: "依據規章制度裁決", trait: "C"}]},
            {q: "15. 你最希望獲得哪種成就感？", options: [{text: "看到他人因我而改變", trait: "S"}, {text: "帶領團隊達成目標", trait: "E"}, {text: "建立高效精確的系統", trait: "C"}]}
        ];

        // 完整性格資料
        const PERSONALITY_INFO = {
            "R": {title: "R型 - 實際型 (Realistic)", desc: "你喜歡具體的任務，動手能力強，偏好使用工具。通常偏好能看到實際成果的工作。"},
            "A": {title: "A型 - 藝術型 (Artistic)", desc: "你富有創造力與直覺，追求個性化。擅長透過文字或藝術表達深刻的情感。"},
            "I": {title: "I型 - 研究型 (Investigative)", desc: "你充滿好奇心，擅長邏輯分析與解決複雜問題。習慣用理性數據理解世界。"},
            "S": {title: "S型 - 社交型 (Social)", desc: "你具備高度同理心。喜歡與人互動，擅長教導、諮商或服務他人。"},
            "E": {title: "E型 - 企業型 (Enterprising)", desc: "你具備領導力與說服力，喜歡競爭與冒險。擅長組織資源並達成商業目標。"},
            "C": {title: "C型 - 常規型 (Conventional)", desc: "你細心且尊重規則。喜歡處理數據與行政事務，追求效率與精確度。"}
        };

        const AI_IMPACT_INFO = {
            "R": {rate: "60% - 80% (高風險)", reason: "高風險：重複性體力勞動極易被機器人取代。建議提升設備維修與管理技能。"},
            "A": {rate: "15% - 25% (低風險)", reason: "低風險：AI 缺乏真正的靈魂與情感共鳴，你的核心競爭力在於人性表達。"},
            "I": {rate: "30% - 50% (中等風險)", reason: "中等風險：AI 擅長數據分析，但核心的科學決策與從零到一的創新仍依賴人類。"},
            "S": {rate: "20% - 35% (低風險)", reason: "低風險：真實的情感連結與深度共情是 AI 目前無法模擬的，人際服務價值穩固。"},
            "E": {rate: "25% - 40% (中低風險)", reason: "中低風險：複雜的商業談判與領導魅力是 AI 難以掌握的「政治智慧」。"},
            "C": {rate: "75% - 90% (高風險)", reason: "高風險：這是 AI 的核心戰場，標準化流程極易被自動化取代。建議轉向流程優化。"}
        };

        let scores = { "R": 0, "A": 0, "I": 0, "S": 0, "E": 0, "C": 0 };
        let currentQIndex = 0;
        let finalType = "";

        const viewQuestion = document.getElementById('view-question');
        const viewPersonality = document.getElementById('view-personality');
        const viewAIImpact = document.getElementById('view-ai-impact');

        window.onload = loadQuestion;

        function loadQuestion() {
            if (currentQIndex < QUESTIONS.length) {
                const qData = QUESTIONS[currentQIndex];
                document.getElementById('q-text').innerText = qData.q;
                const optionsContainer = document.getElementById('options-container');
                optionsContainer.innerHTML = '';
                
                qData.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt.text;
                    btn.onclick = () => recordAnswer(opt.trait);
                    optionsContainer.appendChild(btn);
                });

                document.getElementById('progress-text').innerText = `進度: ${currentQIndex + 1} / ${QUESTIONS.length}`;
            } else {
                calculateResult();
            }
        }

        function recordAnswer(trait) {
            scores[trait]++;
            currentQIndex++;
            loadQuestion();
        }

        function calculateResult() {
            let maxScore = -1;
            for (const [trait, score] of Object.entries(scores)) {
                if (score > maxScore) {
                    maxScore = score;
                    finalType = trait;
                }
            }
            showPersonalityResult();
        }

        function showPersonalityResult() {
            viewQuestion.classList.add('hidden');
            viewPersonality.classList.remove('hidden');
            const info = PERSONALITY_INFO[finalType];
            document.getElementById('p-title').innerText = info.title;
            document.getElementById('p-desc').innerText = info.desc;
        }

        function showAIImpact() {
            viewPersonality.classList.add('hidden');
            viewAIImpact.classList.remove('hidden');
            const typeTitle = PERSONALITY_INFO[finalType].title;
            const aiInfo = AI_IMPACT_INFO[finalType];
            document.getElementById('ai-title').innerText = `【${typeTitle}】 的未來生存挑戰`;
            document.getElementById('ai-rate').innerText = `AI 取代可能性預測: ${aiInfo.rate}`;
            document.getElementById('ai-reason').innerText = aiInfo.reason;
        }

        function restartTest() {
            scores = { "R": 0, "A": 0, "I": 0, "S": 0, "E": 0, "C": 0 };
            currentQIndex = 0;
            viewAIImpact.classList.add('hidden');
            viewQuestion.classList.remove('hidden');
            loadQuestion();
        }
    </script>
</body>
</html>
